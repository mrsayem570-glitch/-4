<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad System</title>

<style>
body{
    background:#111;
    color:#fff;
    text-align:center;
    font-family:Arial;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:6px;
    background:#00ffcc;
    font-size:16px;
    cursor:pointer;
}

#circle{
    width:120px;
    height:120px;
    border-radius:50%;
    margin:20px auto;
    background:#222;
    transition: background 0.3s ease;
}
</style>
</head>

<body>

<h2>Earn Points</h2>

<p>Ads: <span id="ads">0</span></p>
<p>Points: <span id="points">0</span></p>

<div id="circle"></div>
<p id="percent">0%</p>

<button id="btn">Loading...</button>

<!-- Monetag SDK -->
<script src="https://libtl.com/sdk.js" data-zone="10852660" data-sdk="show_10852660"></script>

<script>
let ads = 0;
let points = 0;
let btn = document.getElementById("btn");

function update(){
    document.getElementById("ads").innerText = ads;
    document.getElementById("points").innerText = points.toFixed(2);

    let p = (ads % 10) * 10; // প্রতি 10 অ্যাডে প্রগ্রেস রিসেট
    document.getElementById("percent").innerText = p+"%";

    document.getElementById("circle").style.background =
    `conic-gradient(#00ffcc ${p}%, #222 ${p}%)`;
}

// SDK চেক ফাংশন
function ready(){
    if(typeof window.show_10852660 === "function"){
        btn.innerText = "Watch Ad";
        btn.disabled = false;
    } else {
        btn.innerText = "Demo Ad";
        btn.disabled = false;
        setTimeout(ready, 1000); // SDK না থাকলে প্রতি 1 সেকেন্ডে চেক করবে
    }
}
ready();

// বাটন ক্লিক হ্যান্ডলার
btn.onclick = function(){
    btn.disabled = true; // ক্লিকের সময় বাটন ডিসেবল
    if(typeof window.show_10852660 === "function"){
        show_10852660().then(()=>{
            ads++;
            points += 0.5;
            update();
            btn.disabled = false;
        }).catch(()=>{
            alert("Ad failed");
            btn.disabled = false;
        });
    } else {
        alert("Demo Ad Played ✅");
        ads++;
        points += 0.5;
        update();
        btn.disabled = false;
    }
}

update();
</script>

</body>
</html>
